<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- PWA: installable app shell (offline-first, per product spec §9). -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FAF9F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tailor's Ledger" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* Stop mobile Safari/Chrome from auto-inflating text in single-column layouts, which
         otherwise renders the app's fonts noticeably larger than on native. */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Warm backdrop shown only around the centered app column on wide screens. */
        background-color: #ebe7df;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* The app is mobile-first; on desktop keep it a centered ~phone-width column rather
         than stretching edge to edge. No effect on mobile (viewport < 680px). */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        max-width: 680px;
        margin: 0 auto;
        background-color: #faf9f6;
        box-shadow: 0 0 32px rgba(94, 8, 39, 0.06);
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>

    <!-- PWA: register the offline service worker (Expo does not generate one). -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js').catch(function (err) {
            console.warn('[pwa] service worker registration failed', err);
          });
        });
      }
    </script>
  </body>
</html>
